{% extends "ecommerce/base.html" %}

{% block title %}Acquisto{% endblock %}

{% block content %}

<h1>Acquisto prodotto</h1>

<form method="POST">
    {% csrf_token %}

    {{ form.as_p }}

    {% if form.errors %}
        <div style="color:red;">
            {{ form.errors }}
        </div>
    {% endif %}

    <button type="submit">Acquista</button>
</form>

{% endblock %}
