<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Acquisto prodotto</title>
</head>
<body>

    <h1>Acquisto prodotto</h1>

    <form method="POST" action="">
        {% csrf_token %}

        <p>
            {{ form.prodotto.label_tag }}
            {{ form.prodotto }}
        </p>

        <p>
            {{ form.quantita.label_tag }}
            {{ form.quantita }}
        </p>

        <p>
            {{ form.codice_sconto.label_tag }}
            {{ form.codice_sconto }}
        </p>

        {% if form.errors %}
            <div style="color:red;">
                {{ form.errors }}
            </div>
        {% endif %}

        <button type="submit">Acquista</button>
    </form>

    <p>
        <a href="#">Torna al catalogo</a>
    </p>

</body>
</html>
