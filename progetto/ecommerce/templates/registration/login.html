<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body>

<h1>Login</h1>

<form method="POST">
    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">Login</button>
</form>

{% if form.errors %}
    <p style="color:red;">
        Username o password errati
    </p>
{% endif %}

</body>
</html>
