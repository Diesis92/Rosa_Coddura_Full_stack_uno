services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shopbot
      MYSQL_USER: shopbot
      MYSQL_PASSWORD: shopbot
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

  app:
    image: shopbot-rag-ollama-app:latest
    build:
      context: .
    depends_on:
      mysql:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_CHAT_MODEL: llama3.2:3b
      OLLAMA_EMBED_MODEL: nomic-embed-text
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: shopbot
      MYSQL_PASSWORD: shopbot
      MYSQL_DATABASE: shopbot
      CHROMA_PATH: /app/chroma_db
      COLLECTION_NAME: prodotti
      TOP_K: "5"
      MAX_DISTANCE: "1.2"
      MAX_TURNS: "8"
    volumes:
      - ./chroma_db:/app/chroma_db
    stdin_open: true
    tty: true

volumes:
  mysql_data:
  ollama_models:
