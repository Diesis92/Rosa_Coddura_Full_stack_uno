const numeri = [4, 7, 10, 3, 8];

// Conta quanti numeri sono maggiori di 5

}

//media somma di tutti diviso i valori per esempio 6,7,8,10 diviso i voti
function media(...voti){
    let somma = 0;
    for (const voto of voti){
        somma += voto;
    }

    return somma / voti.length;
}

console.log(media(6,7,8,10))

//estrazione di più elementi con map
const prodotti = [
    { nome: "A", prezzo: 10, attivo: true },
    { nome: "B", prezzo: 20, attivo: false },
    { nome: "C", prezzo: 30, attivo: true }
];

});

//crea una pagina con un campo di testo e un paragrafo vuoto


const campo = document.querySelector('#eco');
const paragrafo = document.querySelector('#riempi');
const bottone = document.querySelector('#reset');

// copia in tempo reale
campo.addEventListener('input', (e) => {
    paragrafo.textContent = e.target.value;
});

// bottone reset
bottone.addEventListener('click', () => {
    campo.value = "";
    paragrafo.textContent = "";
});

// seleziona due elementi con querySelector
//ascolta l'evento input sul campo e copia in tempo reale ciò che l utente scrive sul paragrafo
