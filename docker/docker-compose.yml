version: "3.8"

networks:
  gitea:
  driver: bridge

volumes:
  gitea-data:
    progres-data:
#gitea: è un server github self-hosted, che consente di ospitare i propri repository git in modo autonomo. Progres: è un'applicazione web per la gestione dei progetti, che consente di tenere traccia delle attività, dei problemi e delle scadenze.

services: 
  db:
    image: postgres:14-alpine
    container_name: gitea-db
    restart: always
    environment:
      - POSTGRES_PASSWORD=gitea
      - POSTGRES_USER=gitea
      - POSTGRES_DB=gitea
    networks:
        - gitea
    volumes:
      - gitea-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitea -d gitea"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  server:
    image: gitea/gitea:latest
    container_name: gitea-server
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__database__DB_TYPE=postgres
      - GITEA__database__HOST=db:5432   
      - GITEA__database__NAME=gitea
      - GITEA__database__USER=gitea
      - GITEA__database__PASSWD=gitea
      - GITEA_server_DOMAIN=localhost
      - GITEA_server_SSH_DOMAIN=localhost
      - GITEA_server_ROOT_URL=http://localhost:3000/
    networks:
        - gitea
    volumes:
        - gitea-data:/data
    ports:
      - "3000:3000"
      - "2222:22"
    depends_on:
      db:
        condition: service_healthy

