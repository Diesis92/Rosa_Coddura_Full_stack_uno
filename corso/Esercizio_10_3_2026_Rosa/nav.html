<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navbar</title>
    <style>
               body{
                  margin: 0;
                  padding: 0;
              }

              nav{
                  display: flex;
                  flex-direction: row;
                  justify-content: center;
                  gap: 1.5em;
                  background-color:darkslategrey;
                  padding: 1rem;
                  font-size: 1.5em;
              }
                  a{
                      text-decoration: none;
                      color: rgb(15, 153, 100);
                  }

                a:hover {
                    background-color: white;
                }
    </style>
  </head>
  <body>
    <nav>
      <a href="#">Home</a>
      <a href="#">Servizi</a>
      <a href="#">Chi siamo</a>
      <a href="#">Contatti</a>
    </nav>
  </body>
