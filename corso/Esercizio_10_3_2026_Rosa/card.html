<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card</title>
    <style>
        body{
            margin: 0;
            padding: 0;
        }

        .card{
            max-width: 300px;
            margin: 50px auto;
            border-radius: 10px;
            background-color: palevioletred;
            box-shadow: 0 4px 8px 0 rgba(0,0,0,0.2);
            padding: 0.75em;
            text-align: center;
            color: aliceblue;
        }

        .card img{
            width: 100%;
        }

       

        .card h2{
            margin: 0.2em;
        }
        card .p{
            margin-top: 0.2em;
        }
        .card a{
            text-decoration: none;
            font-size: 1.5em;
            background-color: aliceblue;
            /* padding: 0.2em; */
            padding-left: 1em;
            padding-right: 1em;
            border-radius: 10px;  
            color: brown;
            display: block; 
        }

        .card a:hover{
            background-color: rgb(197, 115, 57);
        }

        
    </style>
</head>
<body>
   <div class="card">
  <img src="/asset/card/foto_card.jpg" alt="Profilo">

  <h2>Rosa Cristina Coddura</h2>

  <p>Sviluppatrice web appassionato di tecnologia.</p>

<a href="#" >Contattami</a>
</div>

</html>
