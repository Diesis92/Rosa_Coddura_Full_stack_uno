<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

<p id="data"></p>

<script>

switch (new Date().getDay()) {

    case 1:
        document.getElementById("data").innerHTML = "Lunedì";
        break;

    case 2:
        document.getElementById("data").innerHTML = "Martedì";
        break;

    case 3:
        document.getElementById("data").innerHTML = "Mercoledì";
        break;

    case 4:
        document.getElementById("data").innerHTML = "Giovedì";
        break;

    case 5:
        document.getElementById("data").innerHTML = "Venerdì";
        break;

    case 6:
        document.getElementById("data").innerHTML = "Sabato";
        break;

    case 0:
        document.getElementById("data").innerHTML = "Domenica";
        break;

    default:
        document.getElementById("data").innerHTML = "Errore";
}

</script>

</body>
</html>
